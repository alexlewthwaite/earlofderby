<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earl of Derby — Castletown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Jost:wght@300;400;500&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:'Nomark';
    src:url('assets/fonts/nomark.woff2') format('woff2');
    font-weight:400;
    font-style:normal;
    font-display:swap;
  }
  :root{
    --ink:#142A3D;
    --ink-deep:#0E1F2E;
    --paper:#ECEBE2;
    --gilt:#B9A36A;
    --gilt-soft:#CBB984;
    --green:#4C6A54;
    --green-soft:#6E8C73;

    --cream-dim:rgba(236,235,226,.6);
    --hairline:rgba(185,163,106,.28);
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{height:100%}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Jost',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  .gateway{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
  }

  /* ---------- hero carousel ---------- */
  .hero{
    position:relative;
    width:100%;
    height:70vh;
    height:70dvh;
    min-height:420px;
    overflow:hidden;
  }

  .hero-slide{
    position:absolute;
    inset:0;
    opacity:0;
    transition:opacity 1.2s ease;
  }
  .hero-slide.active{opacity:1}

  .hero-slide img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .hero-overlay{
    position:absolute;
    inset:0;
    background:
      linear-gradient(to bottom, rgba(14,31,46,.45) 0%, rgba(14,31,46,.15) 40%, rgba(14,31,46,.55) 100%);
    z-index:1;
  }

  .hero-pips{
    position:absolute;
    bottom:1.5rem;
    left:50%;
    transform:translateX(-50%);
    z-index:3;
    display:flex;
    gap:.6rem;
  }
  .hero-pip{
    width:8px;height:8px;
    border-radius:50%;
    border:1.5px solid var(--paper);
    background:transparent;
    cursor:pointer;
    transition:background .3s ease;
    padding:0;
  }
  .hero-pip.active{background:var(--gilt)}

  /* ---------- brand lockup ---------- */
  .brand{
    position:absolute;
    inset:0;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:1.5rem;
    opacity:0;
    transform:translateY(14px);
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .15s forwards;
  }

  .hero-logo{
    width:clamp(180px,28vw,320px);
    height:auto;
    display:block;
    margin:0 auto clamp(1rem,2.4vh,1.6rem);
    filter:drop-shadow(0 2px 12px rgba(0,0,0,.3));
  }

  .place{
    font-size:.72rem;
    letter-spacing:.42em;
    text-transform:uppercase;
    color:var(--cream-dim);
    font-weight:400;
    padding-left:.42em;
  }

  /* ---------- the three routes ---------- */
  .routes{
    flex:1;
    display:flex;
    border-top:1px solid var(--hairline);
  }

  .route{
    position:relative;
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:clamp(2rem,7vh,4rem) 1.6rem;
    text-decoration:none;
    color:var(--paper);
    overflow:hidden;
    isolation:isolate;
    opacity:0;
    animation:rise .8s cubic-bezier(.2,.7,.2,1) forwards;
    transition:background-color .5s ease;
  }
  .route + .route{border-left:1px solid var(--hairline)}
  .route:nth-child(1){animation-delay:.7s}
  .route:nth-child(2){animation-delay:.82s}
  .route:nth-child(3){animation-delay:.94s}

  /* accent glow that blooms on hover */
  .route::before{
    content:"";
    position:absolute;
    inset:0;
    z-index:-1;
    background:radial-gradient(80% 60% at 50% 42%, var(--accent), transparent 72%);
    opacity:0;
    transition:opacity .5s ease;
  }
  .route:hover::before,
  .route:focus-visible::before{opacity:.22}

  .eyebrow{
    font-size:.7rem;
    letter-spacing:.4em;
    text-transform:uppercase;
    color:var(--accent-soft);
    margin-bottom:1.1rem;
    padding-left:.4em;
    transition:color .4s ease;
  }

  .venue{
    font-family:'Nomark',serif;
    font-weight:400;
    font-style:normal;
    font-size:clamp(1.9rem,3.2vw,2.9rem);
    line-height:1.15;
    letter-spacing:.02em;
    -webkit-text-stroke:.5px currentColor;
    margin-bottom:1.4rem;
  }
  .venue small{
    display:block;
    font-size:.52em;
    letter-spacing:.26em;
    text-transform:uppercase;
    color:var(--cream-dim);
    font-family:'Jost',sans-serif;
    font-weight:400;
    margin-top:.5rem;
  }

  .desc{
    max-width:24ch;
    font-size:.92rem;
    line-height:1.55;
    color:var(--cream-dim);
    font-weight:300;
    margin-bottom:1.6rem;
  }

  .action{
    font-size:.72rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--accent-soft);
    display:inline-flex;
    align-items:center;
    gap:.6em;
  }
  .action .arrow{
    display:inline-block;
    transition:transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .route:hover .action .arrow,
  .route:focus-visible .action .arrow{transform:translateX(6px)}

  /* the accent rule that draws under each route on hover */
  .route::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:clamp(1.6rem,5vh,3rem);
    width:0;
    height:2px;
    background:var(--accent-soft);
    transform:translateX(-50%);
    transition:width .45s cubic-bezier(.2,.7,.2,1);
  }
  .route:hover::after,
  .route:focus-visible::after{width:clamp(40px,5vw,64px)}

  /* unified brand accents — gold active accent, green hover bloom */
  .route{--accent:var(--green);--accent-soft:var(--gilt-soft)}

  .route:focus-visible{outline:2px solid var(--gilt-soft);outline-offset:-10px}

  /* ---------- footer thread ---------- */
  .foot{
    text-align:center;
    padding:1.4rem 1.5rem 1.8rem;
    border-top:1px solid var(--hairline);
    font-size:.66rem;
    letter-spacing:.26em;
    text-transform:uppercase;
    color:rgba(243,238,227,.4);
  }

  /* ---------- motion ---------- */
  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  @keyframes draw{to{transform:scaleX(1)}}

  @media (prefers-reduced-motion:reduce){
    .brand,.route,.rule{animation:none;opacity:1;transform:none}
    .rule{transform:scaleX(1)}
  }

  /* ---------- responsive ---------- */
  @media (max-width:760px){
    .hero{height:55vh;min-height:320px}
    .routes{flex-direction:column;border-top:1px solid var(--hairline)}
    .route{padding:clamp(1.4rem,3.4vh,2.2rem) 1.6rem}
    .route + .route{border-left:none;border-top:1px solid var(--hairline)}
    .route::after{bottom:.7rem}
    .eyebrow{margin-bottom:.7rem}
    .venue{margin-bottom:.9rem}
  }
</style>
</head>
<body>
  <main class="gateway">

    <section class="hero">
      <div class="hero-slide active"><img src="assets/img/eod-003.jpg" alt="The Charles Suite"></div>
      <div class="hero-slide"><img src="assets/img/eod-035.jpg" alt="The Wine Bar"></div>
      <div class="hero-slide"><img src="assets/img/eod-020.jpg" alt="The William Suite"></div>
      <div class="hero-slide"><img src="assets/img/eod-038.jpg" alt="The Café"></div>
      <div class="hero-slide"><img src="assets/img/eod-036.jpg" alt="The Bar"></div>
      <div class="hero-overlay"></div>

      <header class="brand">
        <img class="hero-logo" src="assets/img/logo-light.png" alt="Earl of Derby">
      </header>

      <div class="hero-pips"></div>
    </section>

    <nav class="routes" aria-label="Choose a venue">

      <a class="route hotel" href="hotel.html">
        <span class="eyebrow">Stay</span>
        <h2 class="venue">Hotel</h2>
        <span class="action">Book a suite <span class="arrow">→</span></span>
      </a>

      <a class="route wine" href="wine-bar.html">
        <span class="eyebrow">Drink</span>
        <h2 class="venue">Wine Bar</h2>
        <span class="action">Reserve a table <span class="arrow">→</span></span>
      </a>

      <a class="route cafe" href="cafe.html">
        <span class="eyebrow">Gather</span>
        <h2 class="venue">Café</h2>
        <span class="action">Hours &amp; menu <span class="arrow">→</span></span>
      </a>

    </nav>

    <footer class="foot">© Picaro Limited 2026</footer>

  </main>
<script>
(function(){
  const slides = document.querySelectorAll('.hero-slide');
  const pipsWrap = document.querySelector('.hero-pips');
  let cur = 0, timer;

  slides.forEach((_,i) => {
    const pip = document.createElement('button');
    pip.className = 'hero-pip' + (i === 0 ? ' active' : '');
    pip.setAttribute('aria-label', 'Show image ' + (i+1));
    pip.addEventListener('click', () => goTo(i));
    pipsWrap.appendChild(pip);
  });

  const pips = pipsWrap.querySelectorAll('.hero-pip');

  function goTo(n){
    slides[cur].classList.remove('active');
    pips[cur].classList.remove('active');
    cur = n;
    slides[cur].classList.add('active');
    pips[cur].classList.add('active');
    resetTimer();
  }

  function next(){ goTo((cur + 1) % slides.length); }

  function resetTimer(){
    clearInterval(timer);
    timer = setInterval(next, 5000);
  }

  resetTimer();
})();
</script>
</body>
</html>
