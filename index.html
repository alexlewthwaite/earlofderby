<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earl of Derby — Castletown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Jost:wght@300;400;500&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#142A3D;
    --ink-deep:#0E1F2E;
    --paper:#ECEBE2;
    --gilt:#B9A36A;
    --gilt-soft:#CBB984;
    --green:#4C6A54;
    --green-soft:#6E8C73;

    --cream-dim:rgba(236,235,226,.6);
    --hairline:rgba(185,163,106,.28);
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{height:100%}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Jost',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  .gateway{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    /* faint warm vignette so the navy isn't flat */
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(176,140,79,.10), transparent 60%),
      radial-gradient(140% 120% at 50% 120%, var(--ink-deep), var(--ink) 55%);
  }

  /* ---------- brand lockup ---------- */
  .brand{
    text-align:center;
    padding:clamp(2.4rem,6vh,4.5rem) 1.5rem clamp(1.6rem,4vh,2.6rem);
    opacity:0;
    transform:translateY(14px);
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .15s forwards;
  }

  .stag{
    width:clamp(46px,7vw,68px);
    height:auto;
    display:block;
    margin:0 auto clamp(.8rem,2vh,1.3rem);
  }
  .stag path,.stag line{
    stroke:var(--gilt-soft);
    stroke-width:5;
    stroke-linecap:round;
    stroke-linejoin:round;
    fill:none;
  }

  .wordmark{
    font-family:'Fraunces',serif;
    font-optical-sizing:144;
    font-weight:400;
    letter-spacing:.14em;
    font-size:clamp(1.7rem,4.4vw,3rem);
    line-height:1;
    color:var(--paper);
    display:flex;
    align-items:baseline;
    justify-content:center;
    gap:.34em;
  }
  .wordmark .of{
    font-style:italic;
    font-weight:300;
    letter-spacing:.04em;
    font-size:.46em;
    color:var(--gilt-soft);
    transform:translateY(-.18em);
  }

  .rule{
    width:min(280px,46vw);
    height:1px;
    background:var(--gilt);
    margin:clamp(1rem,2.4vh,1.5rem) auto clamp(.7rem,1.8vh,1.1rem);
    transform:scaleX(0);
    transform-origin:center;
    animation:draw 1s cubic-bezier(.2,.7,.2,1) .55s forwards;
  }

  .place{
    font-size:.72rem;
    letter-spacing:.42em;
    text-transform:uppercase;
    color:var(--cream-dim);
    font-weight:400;
    padding-left:.42em; /* optical balance for tracking */
  }

  /* ---------- the three routes ---------- */
  .routes{
    flex:1;
    display:flex;
    border-top:1px solid var(--hairline);
  }

  .route{
    position:relative;
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:clamp(2rem,7vh,4rem) 1.6rem;
    text-decoration:none;
    color:var(--paper);
    overflow:hidden;
    isolation:isolate;
    opacity:0;
    animation:rise .8s cubic-bezier(.2,.7,.2,1) forwards;
    transition:background-color .5s ease;
  }
  .route + .route{border-left:1px solid var(--hairline)}
  .route:nth-child(1){animation-delay:.7s}
  .route:nth-child(2){animation-delay:.82s}
  .route:nth-child(3){animation-delay:.94s}

  /* accent glow that blooms on hover */
  .route::before{
    content:"";
    position:absolute;
    inset:0;
    z-index:-1;
    background:radial-gradient(80% 60% at 50% 42%, var(--accent), transparent 72%);
    opacity:0;
    transition:opacity .5s ease;
  }
  .route:hover::before,
  .route:focus-visible::before{opacity:.22}

  .eyebrow{
    font-size:.7rem;
    letter-spacing:.4em;
    text-transform:uppercase;
    color:var(--accent-soft);
    margin-bottom:1.1rem;
    padding-left:.4em;
    transition:color .4s ease;
  }

  .venue{
    font-family:'Outfit',sans-serif;
    font-weight:700;
    font-size:clamp(1.9rem,3.2vw,2.9rem);
    line-height:1.05;
    letter-spacing:-.01em;
    margin-bottom:1.4rem;
  }
  .venue small{
    display:block;
    font-size:.52em;
    letter-spacing:.26em;
    text-transform:uppercase;
    color:var(--cream-dim);
    font-family:'Jost',sans-serif;
    font-weight:400;
    margin-top:.5rem;
  }

  .desc{
    max-width:24ch;
    font-size:.92rem;
    line-height:1.55;
    color:var(--cream-dim);
    font-weight:300;
    margin-bottom:1.6rem;
  }

  .action{
    font-size:.72rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--accent-soft);
    display:inline-flex;
    align-items:center;
    gap:.6em;
  }
  .action .arrow{
    display:inline-block;
    transition:transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .route:hover .action .arrow,
  .route:focus-visible .action .arrow{transform:translateX(6px)}

  /* the accent rule that draws under each route on hover */
  .route::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:clamp(1.6rem,5vh,3rem);
    width:0;
    height:2px;
    background:var(--accent-soft);
    transform:translateX(-50%);
    transition:width .45s cubic-bezier(.2,.7,.2,1);
  }
  .route:hover::after,
  .route:focus-visible::after{width:clamp(40px,5vw,64px)}

  /* unified brand accents — gold active accent, green hover bloom */
  .route{--accent:var(--green);--accent-soft:var(--gilt-soft)}

  .route:focus-visible{outline:2px solid var(--gilt-soft);outline-offset:-10px}

  /* ---------- footer thread ---------- */
  .foot{
    text-align:center;
    padding:1.4rem 1.5rem 1.8rem;
    border-top:1px solid var(--hairline);
    font-size:.66rem;
    letter-spacing:.26em;
    text-transform:uppercase;
    color:rgba(243,238,227,.4);
  }

  /* ---------- motion ---------- */
  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  @keyframes draw{to{transform:scaleX(1)}}

  @media (prefers-reduced-motion:reduce){
    .brand,.route,.rule{animation:none;opacity:1;transform:none}
    .rule{transform:scaleX(1)}
  }

  /* ---------- responsive ---------- */
  @media (max-width:760px){
    .routes{flex-direction:column;border-top:1px solid var(--hairline)}
    .route{padding:clamp(1.4rem,3.4vh,2.2rem) 1.6rem}
    .route + .route{border-left:none;border-top:1px solid var(--hairline)}
    .route::after{bottom:.7rem}
    .eyebrow{margin-bottom:.7rem}
    .venue{margin-bottom:.9rem}
  }
</style>
</head>
<body>
  <main class="gateway">

    <header class="brand">
      <!-- Placeholder stag mark — swap for the in-house logo -->
      <svg class="stag" viewBox="0 0 120 120" aria-hidden="true">
        <!-- antlers -->
        <path d="M60 70 L60 40"/>
        <path d="M60 48 C54 40 50 36 40 34 C46 30 40 22 34 22 C40 28 30 30 26 24 C30 34 38 34 44 40 C40 46 48 50 54 52"/>
        <path d="M60 48 C66 40 70 36 80 34 C74 30 80 22 86 22 C80 28 90 30 94 24 C90 34 82 34 76 40 C80 46 72 50 66 52"/>
        <path d="M60 44 C57 38 56 34 58 28 M60 44 C63 38 64 34 62 28"/>
        <!-- head -->
        <path d="M48 60 C48 54 54 50 60 50 C66 50 72 54 72 60 C72 70 68 84 60 92 C52 84 48 70 48 60 Z"/>
        <!-- ears -->
        <path d="M48 60 C42 58 38 60 36 64 M72 60 C78 58 82 60 84 64"/>
        <!-- eyes -->
        <line x1="55" y1="64" x2="55" y2="64.5"/>
        <line x1="65" y1="64" x2="65" y2="64.5"/>
      </svg>

      <div class="wordmark">EARL <span class="of">of</span> DERBY</div>
      <div class="rule"></div>
      <div class="place">Castletown · Isle of Man</div>
    </header>

    <nav class="routes" aria-label="Choose a venue">

      <a class="route hotel" href="hotel.html">
        <span class="eyebrow">Stay</span>
        <h2 class="venue">Hotel</h2>
        <span class="action">Book a suite <span class="arrow">→</span></span>
      </a>

      <a class="route wine" href="wine-bar.html">
        <span class="eyebrow">Drink</span>
        <h2 class="venue">Wine Bar</h2>
        <span class="action">Reserve a table <span class="arrow">→</span></span>
      </a>

      <a class="route cafe" href="cafe.html">
        <span class="eyebrow">Gather</span>
        <h2 class="venue">Café</h2>
        <span class="action">Hours &amp; menu <span class="arrow">→</span></span>
      </a>

    </nav>

    <footer class="foot">© Picaro Limited 2026</footer>

  </main>
</body>
</html>
